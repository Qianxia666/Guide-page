            display: flex;

            margin-top: 20px;
        }
        .button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            text-decoration: none; /* 去掉链接下划线 */
            display: inline-block; /* 使链接表现为块元素 */
        }
        .button.primary {
            background-color: #003B5C; /* 左边按钮深色 */
            color: white; /* 文字颜色为白色 */
        }
        .button.primary:hover {
            background-color: #002A43; /* 悬停时的颜色 */
        }
        .button.secondary {
            background-color: #f0f0f0; /* 浅色背景 */
            color: black; /* 文字颜色改为黑色 */
        }
        .button.secondary:hover {
            background-color: #e0e0e0; /* 悬停时的颜色 */
        }

        /* 媒体查询 */
        @media (min-width: 768px) {
            .hero {
