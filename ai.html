<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>跳转中…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            scroll-behavior: smooth;
            background-color: #ffffff; /* 设置为纯白色 */
        }
        .page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #rocket {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
        #countdown {
            font-size: 72px;
            color: #007bff;
            font-weight: bold;
            margin: 20px 0;
            display: block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: gray;
        }
        .overlay-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        .modal p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .modal button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .modal button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="page">
        <div id="rocket">🚀</div>
        <h3><span id="countdown">5</span> 秒后跳转到NextWeb</h3>
        <div class="button-container">
            <button id="googleBtn">NextWeb</button>
            <button id="baiduBtn">Lobe</button>
        </div>
        <div class="footer">
            如果您想了解更多信息或申请测试资格，请<a href="https://web.996898.xyz/faq.html">点击此处</a>
        </div>
    </div>
    <div id="overlay" class="overlay-modal">
        <div class="modal">
            <p>根据归属地相关法律法规，请您务必在合规范围内使用本站的语言大模型。本站不存储您的任何信息，且对生成结果不承担任何责任。<strong>本站只为海外华人提供服务，中国大陆及港澳地区用户因政策问题禁止使用，如执意继续使用所造成的一切问题由使用者全权承担，感谢您的理解与支持！</strong></p>
            <button id="acknowledgeButton">同意</button>
        </div>
    </div>

    <script>
        const span = document.getElementById('countdown');
        let counter = 5;
        let timerId;

        function startCountdown() {
            timerId = setInterval(function() {
                counter -= 1;
                if (counter === 0) {
                    location.href = 'https://ai1.996898.xyz';
                } else {
                    span.textContent = counter;
                }
            }, 1000);
        }

        document.getElementById('googleBtn').addEventListener('click', () => {
            clearInterval(timerId);
            location.href = 'https://ai1.996898.xyz';
        });

        document.getElementById('baiduBtn').addEventListener('click', () => {
            clearInterval(timerId);
            location.href = 'https://ai2.996898.xyz';
        });

        document.getElementById('acknowledgeButton').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            startCountdown();
        });
    </script>
</body>
</html>
