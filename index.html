<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>跳转中…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            scroll-behavior: smooth;
        }
        .page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .page1 {
            background-color: white;
            color: black;
        }
        .page2 {
            position: relative;
            background: url('https://images.unsplash.com/photo-1535957998253-26ae1ef29506?q=80&w=1000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center/cover;
        }
        .page2 .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.1));
        }
        .page2 .text {
            position: absolute;
            bottom: 20%;
            left: 10%;
            color: white;
        }
        .page2 .text h1 {
            margin: 0;
            font-size: 2em;
        }
        .page2 .text p {
            margin: 10px 0 0;
            font-size: 1em;
        }
        h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #rocket {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
        #countdown {
            font-size: 72px;
            color: #007bff;
            font-weight: bold;
            margin: 20px 0;
            display: block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .ad-container {
            margin-top: 20px;
            width: 300px;
            height: 100px;
            border: 2px dashed #007bff;
            border-radius: 10px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .ad-container a {
            font-size: 16px;
            color: black;
            text-decoration: none;
        }
        .ad-container a:hover {
            text-decoration: underline;
        }
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: gray;
        }
        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            font-weight: bold;
            color: gray;
        }
        .language-switch span {
            cursor: pointer;
            margin-left: 10px;
        }
        .language-switch span:hover {
            color: black;
        }
        .overlay-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        .modal p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .modal button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .modal button:hover {
            background-color: #0056b3;
        }
        /* 新代码样式 */
        .container {
            max-width: 2000px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: absolute;
            top: 10%;

        }
        .container h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .faq-item {
            border-top: 1px solid #eee;
            padding: 15px 0;
        }
        .faq-item:first-child {
            border-top: none;
        }
        .faq-question {
            font-size: 18px;
            color: #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-answer {
            margin-top: 10px;
            display: none;
            font-size: 16px;
            color: #666;
        }
        .faq-answer.active {
            display: block;
        }
        .faq-question i {
            transition: transform 0.3s;
        }
        .faq-question i.rotate {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="page page1">
        <div class="language-switch">
            <span id="lang-zh">Chinese</span> or <span id="lang-en">English</span>
        </div>
        <div id="rocket">🚀</div>
        <h3><span id="countdown">5</span> 秒后跳转到NextWeb</h3>
        <div class="button-container">
            <button id="googleBtn">NextWeb</button>
            <button id="baiduBtn">Lobe</button>
        </div>
        <div class="ad-container">
            <a href="https://qr.alipay.com/fkx16480lgnw1yqksezmab7" target="_blank">捐赠｜Alipay donation</a>
        </div>
        <div class="footer">
            如果您想了解更多信息或申请测试资格，请<a href="https://gpt.houyinx.top/faq.html">点击此处</a>
        </div>
    </div>
    <div class="page page2">
        <div class="overlay"></div>

        <!-- 新代码结束 -->
        <div class="text">
            <h1>让AIGC<br>为您的梦想如虎添翼！</h1>
            <p>Let AIGC give wings to your dreams.</p>
        </div>
    </div>
    <div id="overlay" class="overlay-modal">
        <div class="modal">
            <p>根据归属地相关法律法规，请您务必在合规范围内使用本站的语言大模型。本站不存储您的任何信息，且对生成结果不承担任何责任。<strong>本站只为海外华人提供服务，中国大陆及港澳地区用户因政策问题禁止使用，如执意继续使用所造成的一切问题由使用者全权承担，感谢您的理解与支持！</strong></p>
            <button id="acknowledgeButton">同意</button>
        </div>
    </div>

    <script>
        const texts = {
            zh: {
                countdown: "秒后跳转到NextWeb",
                googleBtn: "NextWeb",
                baiduBtn: "Lobe",
                footer: "邮箱：admin@houyinx.top",
                adContent: "捐赠｜Alipay donation"
            },
            en: {
                countdown: "seconds to redirect to NextWeb",
                googleBtn: "NextWeb",
                baiduBtn: "Lobe",
                footer: "Email: admin@houyinx.top",
                adContent: "捐赠｜Alipay donation"
            }
        };

        const h3 = document.querySelector('h3');
        const googleBtn = document.getElementById('googleBtn');
        const baiduBtn = document.getElementById('baiduBtn');
        const footer = document.querySelector('.footer');
        const langZh = document.getElementById('lang-zh');
        const langEn = document.getElementById('lang-en');
        const adContainer = document.querySelector('.ad-container a');

        function switchLanguage(lang) {
            h3.innerHTML = `<span id="countdown">${counter}</span> ${texts[lang].countdown}`;
            googleBtn.textContent = texts[lang].googleBtn;
            baiduBtn.textContent = texts[lang].baiduBtn;
            footer.textContent = texts[lang].footer;
            adContainer.textContent = texts[lang].adContent;
        }

        langZh.addEventListener('click', () => switchLanguage('zh'));
        langEn.addEventListener('click', () => switchLanguage('en'));

        const span = document.getElementById('countdown');
        let counter = 5;
        let timerId;

        function startCountdown() {
            timerId = setInterval(function() {
                counter -= 1;
                if (counter === 0) {
                    location.href = 'https://aione.houyinx.top';
                } else {
                    span.textContent = counter;
                }
            }, 1000);
        }

        baiduBtn.addEventListener('click', () => {
            clearInterval(timerId);
            location.href = 'https://aitwo.houyinx.top';
        });

        googleBtn.addEventListener('click', () => {
            clearInterval(timerId);
            location.href = 'https://aione.houyinx.top';
        });

        document.getElementById('acknowledgeButton').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            startCountdown();
        });

        // 新代码脚本
        function toggleAnswer(element) {
            const answer = element.nextElementSibling;
            const icon = element.querySelector('i');
            if (answer) {
                answer.classList.toggle('active');
                icon.classList.toggle('rotate');
            }
        }
    </script>
</body>
</html>
