<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站导航</title>
    <style>
        :root {
            --primary-color: #007BFF;
            --primary-hover-color: #0056b3;
            --background-color: #f8f9fa;
            --text-color: #333;
            --text-muted: #6c757d;
            --link-color: #007BFF;
            --link-hover-color: #0056b3;
            --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            --border-radius: 10px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: var(--box-shadow);
            border-radius: var(--border-radius);
        }

        h1, h2, h3 {
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            margin-top: 1.5em;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
        }

        h2 {
            font-size: 1.5em;
        }

        h3 {
            font-size: 1.2em;
        }

        p {
            line-height: 1.6;
            margin-bottom: 1em;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: var(--link-hover-color);
            text-decoration: underline;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .code {
            background-color: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }

        .link-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .link-item {
            background-color: #fff; /* 链接项背景色为白色 */
            border: none; /* 去掉边框 */
            border-radius: var(--border-radius);
            padding: 20px;
            width: calc(33% - 40px);
            box-shadow: var(--box-shadow);
            transition: box-shadow 0.3s, transform 0.3s;
            text-align: center;
            box-sizing: border-box;
        }

        .link-item:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transform: translateY(-5px);
        }

        .link-item a {
            text-decoration: none;
            color: var(--link-color);
            font-size: 1.2em;
            display: block;
            margin-top: 10px;
            font-weight: bold;
            transition: color 0.3s;
        }

        .link-item a:hover {
            color: var(--link-hover-color);
        }

        @media (max-width: 768px) {
            .link-item {
                width: calc(45% - 40px);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            h2 {
                font-size: 1.2em;
            }

            h3 {
                font-size: 1em;
            }

            .link-item {
                width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>网站导航</h1>

        <div class="link-container">

            </div>
            <div class="link-item">

            </div>
            <div class="link-item">

            </div>
            <div class="link-item">

            </div>
            <div class="link-item">

        </div>
        <footer class="footer">

</body>
</html>
