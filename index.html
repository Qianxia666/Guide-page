<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站导航</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background-color: #2E4B2D;
            padding: 15px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 {
            color: #ffffff;
            margin: 0;
            font-size: 1.8em;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }
        nav ul li {
            margin-left: 30px;
        }
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav ul li a:hover {
            color: #D4B600;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            margin-top: 80px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
            overflow: hidden;
            color: white;
            text-decoration: none; /* 移除链接下划线 */
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card:nth-child(1) {
            background-color: #2E4B2D;
        }
        .card:nth-child(2) {
            background-color: #4E6E8D;
        }
        .card:nth-child(3) {
            background-color: #EED045;
        }
        .card:nth-child(4) {
            background-color: #A77BCA;
        }
        .card:nth-child(5) {
            background-color: #EE4866;
        }
        .profile {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
        }
        .profile-info .name {
            font-weight: bold;
            font-size: 1.2em;
        }
        .profile-info .status {
            font-size: 0.9em;
            color: #b0bec5;
        }
        .quote {
            font-size: 6em;
            position: absolute;
            top: 15px;
            right: 15px;
            opacity: 0.1;
            font-family: 'Georgia', serif;
        }
        .content {
            position: relative;
            z-index: 1;
        }
        .card p {
            margin: 10px 0;
            line-height: 1.6;
            font-size: 1em;
        }
        @media (max-width: 600px) {
            .quote {
                font-size: 4em;
            }
            .profile-info .name {
                font-size: 1.1em;
            }
            .card p {
                font-size: 1.1em;
                line-height: 1.8;
            }
            .card {
                padding: 15px;
            }
        }
        @media (max-width: 400px) {
            .card {
                padding: 10px;
            }
        }
    </style>
</head>
