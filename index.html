<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>延迟跳转</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: white;
            color: black;
        }
        h3 {
            font-size: 32px; /* 放大标题字体 */
            margin-bottom: 20px;
        }
        #rocket {
            font-size: 96px; /* 放大火箭图标 */
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
        #countdown {
            font-size: 96px; /* 放大倒计时数字字体 */
            color: #007bff; /* 蓝色 */
            font-weight: bold;
            margin: 20px 0;
            display: block; /* 将数字显示为块级元素 */
            margin: 0 auto; /* 水平居中 */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px; /* 按钮之间的间距 */
        }
        button {
            padding: 20px 40px; /* 增大按钮的内边距 */
            font-size: 24px; /* 增大按钮字体 */
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            color: gray;
        }
    </style>
</head>
<body>
    <div id="rocket">🚀</div>
    <h3><span id="countdown">5</span> 秒后跳转到NextWeb</h3>
    <div class="button-container">
        <button id="googleBtn">NextWeb「推荐」</button>
        <button id="baiduBtn">Lobe</button>
    </div>
    <div class="footer">
        邮箱：admin@houyinx.top
    </div>
</body>
<script>
    const baiduBtn = document.getElementById('baiduBtn');
    baiduBtn.addEventListener('click', () => {
        clearInterval(timerId);
        location.href = 'https://aitwo.houyinx.top';
    });

    const googleBtn = document.getElementById("googleBtn");
    googleBtn.addEventListener('click', () => {
        clearInterval(timerId);
        location.href = 'https://aione.houyinx.top';
    });

    const span = document.getElementById('countdown');
    let counter = 5;
    let timerId = setInterval(function() {
        counter -= 1;
        if (counter === 0) {
            location.href = 'https://aione.houyinx.top';
        } else {
            span.textContent = counter;
        }
    }, 1000);
</script>
</html>
